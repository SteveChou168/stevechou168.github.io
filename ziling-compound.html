<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>字靈 · 組字挑戰</title>
<style>
  :root{
    --bg1:#15123a; --bg2:#0d0b26; --machine:#241d4a; --machine2:#352a6b;
    --line:#4a3f86; --ink:#f4f1ff; --dim:#9d96c9;
    --warm:#ff7a59; --warm2:#ffb347; --gold:#ffd86b;
    --cool:#4ea8ff; --cool2:#7ad0ff; --good:#48d6a0; --bad:#ff5470;
    --green:#34c759; --green2:#27a347;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,"PingFang TC","Noto Sans TC",sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    color:var(--ink); overflow:hidden; user-select:none; display:flex; justify-content:center;
  }
  #app{width:100%;max-width:480px;height:100dvh;display:flex;flex-direction:column;padding:12px 16px 18px;position:relative;z-index:2}

  header{display:flex;align-items:center;gap:10px}
  .iconbtn{width:34px;height:34px;border-radius:10px;background:var(--machine2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink)}
  .leavebtn{height:34px;padding:0 12px;border-radius:10px;background:var(--machine2);border:1px solid var(--line);
    color:var(--ink);font-size:13px;font-weight:800;white-space:nowrap;cursor:pointer}
  .leavebtn:active{transform:translateY(1px)}
  .title{font-weight:800;font-size:16px;letter-spacing:.3px;display:flex;align-items:center;gap:5px;overflow:hidden;white-space:nowrap}
  .title b{color:var(--warm2)}
  .title .sep{color:var(--dim);font-weight:600}
  .spacer{flex:1}
  .timer{color:var(--cool2);font-weight:800;font-size:14px;min-width:44px;text-align:right;font-variant-numeric:tabular-nums}
  .score{color:var(--gold);font-weight:800;font-size:15px}

  .statusrow{position:relative;display:flex;justify-content:center;align-items:center;margin:10px 0 4px;min-height:20px}
  .lives{position:absolute;right:2px;top:50%;transform:translateY(-50%);font-size:14px;letter-spacing:1px;white-space:nowrap}
  .pips{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
  .pip{width:12px;height:12px;border-radius:4px;background:var(--machine);border:1px solid var(--line)}
  .pip.on{background:var(--good);border-color:var(--good)}
  .pip.cur{background:var(--gold);border-color:var(--gold)}

  .fuse{position:relative;height:26px;margin:8px 2px 2px;border-radius:9px;background:var(--machine);border:1px solid var(--line)}
  .fuse .cord{position:absolute;left:12px;right:38px;top:50%;transform:translateY(-50%);height:6px;border-radius:4px;background:#9a7140}
  .fuse .burnt{position:absolute;left:12px;top:50%;transform:translateY(-50%);height:6px;border-radius:4px;background:#2a2330;width:0}
  .fuse .flame{position:absolute;left:12px;top:50%;transform:translate(-50%,-50%);font-size:18px}
  .fuse .bomb{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:18px}
  /* 三星門檻線：火焰燒到這條之前拼對 = ⭐⭐⭐ */
  .fuse .star3mark{position:absolute;top:3px;bottom:3px;width:2px;border-radius:2px;background:linear-gradient(var(--gold),rgba(255,216,107,.15));opacity:.75;pointer-events:none;z-index:1}
  .fuse .star3mark::before{content:'⭐';position:absolute;left:50%;top:-13px;transform:translateX(-50%);font-size:10px;line-height:1}
  .fuse.hot{animation:fusehot .25s infinite alternate}
  @keyframes fusehot{from{box-shadow:0 0 0 rgba(255,84,112,0)}to{box-shadow:0 0 14px rgba(255,84,112,.55);border-color:var(--bad)}}
  .boomflash{animation:boomflash .5s}
  @keyframes boomflash{0%{background:rgba(255,84,112,.35)}100%{background:transparent}}

  .goal{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:6px}
  .meaning{color:var(--cool2);font-weight:700;font-size:15px;height:20px}
  .word{display:flex;gap:4px;height:34px;align-items:center;flex-wrap:wrap;justify-content:center}
  .wl{font-weight:900;font-size:22px;color:var(--gold);min-width:15px;text-align:center;
    border-bottom:3px solid var(--line);line-height:1;padding-bottom:2px;opacity:.5;transition:.2s}
  .wl.show{opacity:1;border-color:transparent}
  .wl.sp{border:none;min-width:9px}

  .build{display:flex;align-items:center;justify-content:center;gap:6px;margin:auto 0}
  .slot{flex:1 1 0;max-width:96px;aspect-ratio:4/5;border-radius:18px;background:var(--machine);
    border:2px dashed var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    transition:transform .12s,border-color .12s,background .12s}
  .slot.filled{border-style:solid;border-color:var(--warm);background:var(--machine2)}
  .slot .e{font-size:46px;line-height:1}
  .slot .w{font-size:13px;font-weight:800;color:var(--ink)}
  .slot .q{font-size:38px;color:var(--line)}
  .op{font-size:26px;font-weight:900;color:var(--dim);flex:0 0 auto}
  .goalbox{flex:1.15 1 0;max-width:108px;aspect-ratio:9/10;border-radius:18px;
    background:radial-gradient(circle at 50% 40%,#2a2358,#1b1640);border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;position:relative;overflow:visible}
  .goalbox .e{font-size:54px;line-height:1;transition:.25s}
  .goalbox.dim .e{opacity:.3;filter:grayscale(.55)}
  .goalbox .pop{animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.35)}100%{transform:scale(1)}}

  .build.n3{gap:4px}
  .build.n3 .slot .e{font-size:34px}
  .build.n3 .slot .w{font-size:11px}
  .build.n3 .slot .q{font-size:28px}
  .build.n3 .op{font-size:20px}
  .build.n3 .goalbox .e{font-size:44px}

  .caption{min-height:22px;text-align:center;color:var(--dim);font-weight:700;font-size:14px;margin-top:2px}
  .caption b{color:var(--good)}
  .memo{color:var(--cool2);font-size:13px;font-weight:700;margin-top:3px}
  .memo b{color:var(--gold)}

  .bank{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
  .tile{background:linear-gradient(180deg,#3a2f78,#2a2258);border:1px solid var(--line);border-bottom:3px solid #1c1742;
    border-radius:14px;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:transform .08s,opacity .2s}
  .tile:active{transform:translateY(2px)}
  .tile .e{font-size:32px;line-height:1}
  .tile .w{font-size:13px;font-weight:800;color:var(--ink)}
  .tile.used{opacity:.26;pointer-events:none}

  .row{display:flex;gap:10px}
  .clear{flex:0 0 auto;height:60px;padding:0 20px;border:1px solid var(--line);border-radius:18px;background:var(--machine2);
    color:var(--dim);font-size:16px;font-weight:800}
  .clear:active{transform:translateY(2px)}
  .submit{flex:1;height:60px;border:none;border-radius:18px;font-size:22px;font-weight:900;color:#063018;
    background:linear-gradient(180deg,#3fe06a,var(--green2));box-shadow:0 6px 0 #1e7e38,0 10px 18px rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,opacity .2s}
  .submit:active{transform:translateY(4px);box-shadow:0 2px 0 #1e7e38}
  .submit:disabled{opacity:.4;box-shadow:0 6px 0 #1e7e38}
  .tools{display:flex;justify-content:center;margin-top:10px}
  .toolbtn{background:var(--machine2);border:1px solid var(--gold);color:var(--gold);font-weight:700;font-size:13px;padding:9px 16px;border-radius:11px}

  .items{display:flex;gap:8px;justify-content:center;margin-top:10px}
  .itembtn{position:relative;flex:1;max-width:120px;background:var(--machine2);border:1px solid var(--cool);border-radius:13px;
    color:var(--ink);font-weight:800;padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:transform .08s,opacity .2s}
  .itembtn:active{transform:translateY(2px)}
  .itembtn .ic{font-size:22px;line-height:1}
  .itembtn .nm{font-size:11px;color:var(--cool2)}
  .itembtn .ct{position:absolute;top:-7px;right:-6px;min-width:20px;height:20px;border-radius:10px;
    background:var(--warm);color:#062038;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .itembtn.off{opacity:.35;border-color:var(--line)}
  .itembtn.off .ct{background:var(--line);color:var(--dim)}

  .fuse.frozen{box-shadow:0 0 16px rgba(122,208,255,.7)!important;border-color:var(--cool2)!important}
  .fuse.frozen .cord{background:var(--cool)}

  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(4px)}}
  .quake{animation:quake .55s}
  @keyframes quake{0%,100%{transform:translate(0,0)}8%{transform:translate(-10px,6px) rotate(-1deg)}18%{transform:translate(9px,-7px) rotate(1deg)}28%{transform:translate(-11px,-4px)}38%{transform:translate(10px,7px) rotate(1deg)}48%{transform:translate(-8px,5px)}58%{transform:translate(9px,-4px) rotate(-1deg)}68%{transform:translate(-6px,3px)}78%{transform:translate(5px,-3px)}88%{transform:translate(-3px,2px)}}
  #flash{position:fixed;inset:0;z-index:8;pointer-events:none;background:transparent}

  .toast{position:absolute;top:120px;left:0;right:0;text-align:center;font-weight:800;font-size:19px;pointer-events:none;opacity:0}
  .toast.show{animation:toast 1.3s ease forwards}
  @keyframes toast{0%{opacity:0;transform:translateY(8px)}15%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-20px)}}

  #fx{position:fixed;inset:0;pointer-events:none;z-index:5}
  .fly{position:fixed;z-index:6;pointer-events:none;line-height:1;will-change:transform,opacity}

  /* ---- 世界地圖 ---- */
  .mapOvl{position:fixed;inset:0;background:linear-gradient(180deg,var(--bg1),var(--bg2));z-index:20;
    display:none;flex-direction:column;align-items:center;padding:22px 16px 28px;overflow:auto}
  .mapOvl.show{display:flex}
  .brand{position:absolute;top:14px;right:16px;color:var(--dim);font-size:12px;font-weight:700;
    text-decoration:none;opacity:.85;z-index:2}
  .brand:hover{color:var(--cool2);opacity:1}
  .brand .v{color:var(--line);font-weight:600}
  /* 子畫面固定在左上角的「回地圖」浮動鈕(不必捲到底) */
  .backfab{position:fixed;top:12px;left:14px;z-index:26;background:var(--machine2);border:1px solid var(--line);
    color:var(--cool2);font-weight:800;font-size:13px;padding:8px 14px;border-radius:999px;cursor:pointer;
    box-shadow:0 3px 12px rgba(0,0,0,.4)}
  .backfab:active{transform:translateY(1px)}
  .mapTitle{font-weight:900;font-size:24px;color:var(--ink);letter-spacing:1px}
  .mapTitle b{color:var(--warm2)}
  .mapSub{color:var(--dim);font-size:13px;margin-top:4px}
  .totStar{margin:12px 0 4px;color:var(--gold);font-weight:800;font-size:17px}
  /* 地圖英雄頭部 + 圖示工具列 */
  .mapTitleSm{font-weight:900;font-size:18px;color:var(--ink);letter-spacing:1px;margin-top:2px}
  .mapTitleSm b{color:var(--warm2)}
  .herocard{display:flex;align-items:center;gap:13px;width:100%;max-width:430px;margin-top:12px;
    background:linear-gradient(180deg,var(--machine2),var(--machine));border:1px solid var(--line);border-radius:18px;padding:12px 15px}
  .heroav{flex:0 0 auto;width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:34px;background:radial-gradient(circle at 38% 30%,rgba(255,255,255,.18),rgba(255,255,255,.02) 60%),var(--machine);
    border:2px solid var(--line);overflow:hidden}
  .heroav svg{width:100%;height:100%}
  .heroinfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;text-align:left}
  .heroname{font-weight:900;font-size:18px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .herostats{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .hstat{font-weight:800;font-size:14px}
  .hstar{color:var(--gold)}
  .herocard .playcount{margin-top:1px}
  .toolbar{display:flex;gap:8px;width:100%;max-width:430px;margin-top:10px}
  .toolbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;cursor:pointer;
    background:var(--machine2);border:1px solid var(--line);border-radius:14px;color:var(--cool2)}
  .toolbtn:active{transform:translateY(1px)}
  .toolbtn .ti{font-size:21px;line-height:1}
  .toolbtn .tl{font-size:11px;font-weight:800}
  .toolbtn.hell{color:var(--warm2)}
  .toolbtn.hell.on{background:linear-gradient(180deg,#4a2348,#2a1640);border-color:var(--bad);color:#ff8a8a}
  .playcount{color:var(--cool2);font-size:12px;font-weight:700;margin-top:4px;height:16px;opacity:.9}
  .lbwrap{display:flex;flex-direction:column;gap:8px;width:100%;max-width:430px;margin-top:12px}
  .lbrow{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,var(--machine2),var(--machine));
    border:1px solid var(--line);border-radius:14px;padding:11px 14px}
  .lbrow.me{border-color:var(--gold);box-shadow:0 0 8px rgba(255,216,107,.35)}
  .lbrow .rk{font-size:15px;font-weight:900;width:34px;text-align:center;flex:0 0 auto}
  .lbrow .nm{flex:1;font-weight:800;font-size:16px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lbrow .sc{flex:0 0 auto;color:var(--gold);font-weight:800;font-size:13px;text-align:right;line-height:1.4}
  .lbtabs{display:flex;gap:8px;margin-top:10px}
  .lbtab{background:var(--machine2);border:1px solid var(--line);color:var(--dim);font-weight:800;font-size:13px;padding:7px 16px;border-radius:11px;cursor:pointer}
  .lbtab.on{color:#062038;background:linear-gradient(180deg,var(--warm2),var(--warm));border-color:transparent}
  .worlds{display:flex;flex-direction:column;gap:11px;width:100%;max-width:430px;margin-top:8px}
  .wcard{display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,var(--machine2),var(--machine));
    border:1px solid var(--line);border-radius:18px;padding:13px 15px;cursor:pointer;transition:transform .1s,border-color .2s}
  .wcard:active{transform:scale(.985)}
  .wcard .wico{font-size:38px;width:50px;text-align:center;flex:0 0 auto}
  .wcard .wmid{flex:1;min-width:0}
  .wcard .wnm{font-weight:800;font-size:17px}
  .wcard .wpr{color:var(--dim);font-size:12px;margin-top:3px}
  .wcard .wbar{height:6px;border-radius:3px;background:#1c1742;margin-top:6px;overflow:hidden}
  .wcard .wbar>div{height:100%;width:0;background:linear-gradient(90deg,var(--good),var(--gold));transition:width .4s}
  .wcard .wst{flex:0 0 auto;color:var(--gold);font-weight:800;font-size:13px;text-align:right;min-width:46px}
  .wcard .wadv{color:var(--warm2);font-weight:800}
  .wcard .wreplay{flex:0 0 auto;align-self:center;margin-left:2px;font-size:11px;font-weight:800;color:var(--cool2);
    background:rgba(120,150,255,.14);border:1px solid rgba(120,150,255,.4);border-radius:999px;padding:5px 9px;white-space:nowrap;cursor:pointer}
  .wcard .wreplay:active{transform:scale(.92)}
  .wcard.lock{opacity:.45;filter:grayscale(.7);cursor:not-allowed}
  .wcard.lock .wst{color:var(--dim)}
  .wcard.cleared{border-color:var(--good)}
  .wcard.boss{border-color:var(--bad);background:linear-gradient(180deg,#4a2348,#2a1640)}
  .wcard.boss.lock{border-color:var(--line)}
  .wcard.tower{border-color:var(--gold);background:linear-gradient(180deg,#3a2e10,#241a08);box-shadow:0 0 14px rgba(255,200,90,.22)}
  .wcard.tower .wnm{color:var(--gold)}
  .wcard.tower .wbar>div{background:linear-gradient(90deg,var(--warm2),var(--gold))}
  .wcard.tower.lock{border-color:var(--line);box-shadow:none;background:linear-gradient(180deg,var(--machine2),var(--machine))}
  .wcard.tower.lock .wnm{color:var(--ink)}
  /* 地獄模式：地圖鈕亮 + 全頁紅暈 */
  #hellBtn.on{background:linear-gradient(180deg,#6a1722,#3a0d14);border-color:var(--bad);color:#ff9a9a}
  body.hell #app::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
    box-shadow:inset 0 0 120px rgba(255,40,60,.22);border-top:2px solid rgba(255,60,80,.35)}

  /* ---- 玩家 ---- */
  .curp{display:flex;align-items:center;gap:10px;margin-top:6px}
  .curp #curName{color:var(--ink);font-weight:800;font-size:15px}
  .switchbtn{background:var(--machine2);border:1px solid var(--line);color:var(--cool2);font-weight:700;font-size:12px;padding:5px 12px;border-radius:10px;cursor:pointer}
  .players{display:flex;flex-direction:column;gap:10px;width:100%;max-width:430px;margin:16px 0 6px}
  .pcard{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,var(--machine2),var(--machine));
    border:1px solid var(--line);border-radius:16px;padding:13px 15px;cursor:pointer;transition:transform .1s}
  .pcard:active{transform:scale(.985)}
  .pcard .pav{font-size:28px;width:42px;text-align:center;flex:0 0 auto}
  .pcard .pnm{flex:1;font-weight:800;font-size:17px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcard .pst{color:var(--gold);font-weight:800;font-size:13px;flex:0 0 auto;text-align:right;line-height:1.4}
  .pcard .pdel{color:var(--dim);font-size:15px;padding:4px 6px;flex:0 0 auto;border-radius:8px}
  .pcard .pdel:active{background:rgba(255,84,112,.2);color:var(--bad)}
  .newp{display:flex;gap:8px;width:100%;max-width:430px;margin-top:4px}
  .newp input{flex:1;min-width:0;background:var(--machine);border:1px solid var(--line);border-radius:14px;
    color:var(--ink);font-size:16px;font-weight:700;padding:13px 15px;outline:none;user-select:text;-webkit-user-select:text}
  .newp input:focus{border-color:var(--gold)}
  .newp input::placeholder{color:var(--dim);font-weight:600}
  .newp button{flex:0 0 auto;background:linear-gradient(180deg,var(--warm2),var(--warm));border:none;
    color:#062038;font-weight:800;font-size:16px;padding:0 20px;border-radius:14px;cursor:pointer}

  /* ---- 圖鑑 ---- */
  .dexwrap{width:100%;max-width:440px;margin-top:10px}
  .dexintro{background:var(--machine2);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:14px;text-align:left}
  .dexintro .di{font-size:12px;color:var(--dim);line-height:1.5;margin:4px 0}
  .dexintro .di b{color:var(--ink)}
  .dexintro .di .k{display:inline-block;color:var(--cool2);font-weight:800;margin-right:5px}
  .dexintro .di.gold{color:#e9c66a}.dexintro .di.gold b{color:var(--gold)}.dexintro .di.gold .k{color:var(--gold)}
  .dexsec{margin-bottom:14px}
  .dexsec h4{color:var(--cool2);font-size:14px;font-weight:800;margin:10px 2px 2px;text-align:left}
  .dexnote{font-size:11px;color:var(--dim);text-align:left;margin:0 2px 7px}
  .dexgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .dxi{background:var(--machine2);border:1px solid var(--line);border-radius:10px;padding:6px 2px;
    display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0;cursor:pointer;
    transition:transform .17s cubic-bezier(.2,1.5,.4,1)}
  .dxi.lock{opacity:.4;cursor:default}
  .dxi:active{transform:scale(.94)}
  .dxi .e{font-size:22px;line-height:1.1}
  /* 圖鑑單字放大預覽(燈箱) */
  .dexpv{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:20px;
    background:rgba(8,6,24,.82);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
  .dexpv.show{display:flex}
  .dexpv .card{position:relative;background:var(--machine);border:2px solid var(--gold);border-radius:26px;
    padding:30px 40px 22px;text-align:center;min-width:210px;max-width:86vw;
    box-shadow:0 12px 50px rgba(0,0,0,.5),0 0 26px rgba(255,216,107,.35);
    animation:pvpop .42s cubic-bezier(.2,1.55,.35,1)}
  .dexpv .card.holo{background:linear-gradient(120deg,#3a2f78,#6a4aa0,#2a6a8b,#6a4aa0,#3a2f78);background-size:300% 300%;
    animation:pvpop .42s cubic-bezier(.2,1.55,.35,1),holo 3.2s linear infinite}

  #monPvCard.r1{border-color:#7ad0ff}#monPvCard.r2{border-color:#c08bff}#monPvCard.r3{border-color:var(--gold)}
  /* 出戰夥伴(遊戲畫面角落,不擋操作) */
  #buddy{position:absolute;left:4px;bottom:80px;width:56px;height:56px;z-index:4;pointer-events:none;display:none;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}

</style>

function dexSparkle(cx,cy,holo,host){
  host=host||$('dexPv'); if(!host)return;
  const set=holo?['✨','💎','⭐','🌟']:['✨','⭐'], n=holo?12:8;
  for(let i=0;i<n;i++){

    host.appendChild(s);
    const a=Math.random()*6.28, dist=70+Math.random()*90, rot=Math.random()*160-80;
    s.animate([
      {transform:'translate(-50%,-50%) scale(.3)',opacity:0},
      {transform:'translate(-50%,-50%) scale(1)',opacity:1,offset:.25},
      {transform:'translate(calc(-50% + '+Math.cos(a)*dist+'px),calc(-50% + '+Math.sin(a)*dist+'px)) scale(.5) rotate('+rot+'deg)',opacity:0}
    ],{duration:680+Math.random()*360,easing:'cubic-bezier(.3,1,.4,1)'});
    setTimeout(()=>s.remove(),1060);
  }

  }).catch(()=>{ el.textContent=''; });                  // 讀失敗就靜默隱藏
}
function showTowerEnd(){

function enterStage(st){

/* ===================== 渲染關卡 ===================== */
function buildPips(){const wrap=$('pips');wrap.innerHTML='';for(let i=0;i<curLevels.length;i++){const d=document.createElement('div');d.className='pip'+(i<lIdx?' on':i===lIdx?' cur':'');wrap.appendChild(d)}}
function renderLives(){const el=$('lives');if(el)el.textContent='❤️'.repeat(Math.max(0,lives))+'🤍'.repeat(Math.max(0,curMaxLives-lives));}

function load(){
  const L=curLevels[lIdx];
  const n=L.p.length;
  setFuseForLevel(n);
  $('fuse').classList.remove('hot');
  slots=new Array(n).fill(null);busy=false;
  const W=WORLDS[wIdx];
  if(mode==='tower'){
    $('wIcon').textContent='🗼';
    $('wName').textContent='字靈塔';
    $('stageName').textContent='第 '+(towerFloor+1)+' 層';
    $('lv').textContent=''; $('ltot').textContent='';
    $('lvSep').style.display='none';
  }else{
    $('wIcon').textContent=W.icon;
    $('wName').textContent=(save.hell?'🔥':'')+W.name;
    $('stageName').textContent=stage===0?'基礎':'進階';
    $('lv').textContent=lIdx+1;
    $('ltot').textContent=curLevels.length;
    $('lvSep').style.display='';
  }
  document.body.classList.toggle('hell', mode==='world'&&!!save.hell);   // 地獄紅暈只在戰役
  renderBuddy();                                                         // 出戰夥伴陪玩
  $('meaning').textContent=L.whole.zh;
  $('caption').innerHTML='';
  $('score').textContent=score;

  const b=$('build');b.className='build'+(n===3?' n3':'');b.innerHTML='';
  for(let i=0;i<n;i++){
    if(i>0){const op=document.createElement('div');op.className='op';op.textContent='+';b.appendChild(op);}
    const s=document.createElement('div');s.className='slot';s.id='s'+i;s.innerHTML='<span class="q">?</span>';
    s.onclick=()=>clearSlot(i);b.appendChild(s);
  }
  const eq=document.createElement('div');eq.className='op';eq.textContent='=';b.appendChild(eq);
  const gb=document.createElement('div');gb.className='goalbox dim';gb.id='goalbox';
  gb.innerHTML='<span class="e" id="goalE">'+L.whole.e+'</span>';b.appendChild(gb);

  const wd=$('word');wd.innerHTML='';
  [...L.whole.w].forEach(ch=>{const s=document.createElement('div');
    if(ch===' '){s.className='wl sp';s.textContent='';}
    else{s.className='wl';s.dataset.ch=ch.toUpperCase();s.textContent=' ';}
    wd.appendChild(s);});

  // 干擾卡：越後面的世界越多，再加一點隨機，讓每次手感不同(塔隨樓層、地獄+2)
  const extra=(mode==='tower'? Math.min(6,Math.floor(towerFloor/3)) : Math.min(3,Math.floor(wIdx/2))+(W.boss?2:0))
    +(Math.random()<.5?1:0)+(save.hell?2:0);
  const need=Math.max(6,n+3+extra);
  const wrong=shuffle(DISTRACT.filter(d=>!L.p.some(p=>p.w===d.w))).slice(0,need-n);
  const bank=shuffle([...L.p,...wrong]);
  const bk=$('bank');bk.innerHTML='';
  bank.forEach(item=>{
    const t=document.createElement('div');t.className='tile';t.dataset.w=item.w;
    t.innerHTML='<div class="e">'+item.e+'</div><div class="w">'+item.w+'</div>';
    t.onclick=()=>pick(item,t);bk.appendChild(t);
  });
  buildPips();updateSubmit();updateItems();renderLives();positionMarks();maybeTipStar();
}

function renderSlot(i){
  const el=$('s'+i),v=slots[i];
  if(v){el.className='slot filled';el.innerHTML='<div class="e">'+v.e+'</div><div class="w">'+v.w+'</div>';}
  else{el.className='slot';el.innerHTML='<span class="q">?</span>';}
  el.onclick=()=>clearSlot(i);
}

function clearSlot(i){
  if(busy||!slots[i])return;
  const w=slots[i].w;slots[i]=null;renderSlot(i);
  const tile=[...document.querySelectorAll('.tile')].find(t=>t.dataset.w===w&&t.classList.contains('used'));
  if(tile)tile.classList.remove('used');
  sClear();updateSubmit();
}

function pick(item,tile){
  if(busy)return;aInit();
  const i=slots.findIndex(s=>!s);
  if(i<0)return;
  slots[i]=item;tile.classList.add('used');renderSlot(i);
  vib(8);
  speak(item.w);                          // 只念單字，不再疊一聲「嘟」
  updateSubmit();
}

function updateSubmit(){$('submit').disabled=slots.some(s=>!s)||busy;}

$('clear').onclick=()=>{
  if(busy)return;
  let any=false;
  slots.forEach((s,i)=>{if(s){any=true;slots[i]=null;renderSlot(i);}});
  document.querySelectorAll('.tile.used').forEach(t=>t.classList.remove('used'));
  if(any){sClear();vib(12);}
  updateSubmit();
};

/* ===================== 提交 / 合成 ===================== */
$('submit').onclick=()=>{
  if(busy||slots.some(s=>!s))return;aInit();
  const L=curLevels[lIdx];
  const ok=slots.every((s,i)=>s.w===L.p[i].w);
  if(!ok){
    sBad();vib([30,40,30]); combo=0;    // 答錯中斷連擊
    fuseT=Math.min(fuseT+2.5,fuseMax);  // 答錯：引線快燒
    const sameSet=slots.map(s=>s.w).sort().join()===L.p.map(p=>p.w).sort().join();
    if(sameSet)toast('順序不對！','#ffb347');
    slots.forEach((_,i)=>{const el=$('s'+i);el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),400);});
    setTimeout(()=>{                     // 抖動提示後，自動清掉錯誤答案讓玩家重填
      if(busy)return;
      slots.forEach((s,i)=>{if(s){slots[i]=null;renderSlot(i);}});
      document.querySelectorAll('.tile.used').forEach(t=>t.classList.remove('used'));
      updateSubmit();
    },450);
    return;
  }
  fuse(L);
};

function fuse(L){
  busy=true;updateSubmit();
  running=false;                          // 提交成功，停止引線
  combo++; if(combo>maxCombo)maxCombo=combo; if(combo>(save.bestCombo||0))save.bestCombo=combo;
  failCount=0;                            // 答對清除失敗計數
  if(combo%3===0) dropItem();             // 連擊里程碑(3/6/9…)掉道具
  if(combo%5===0) addDust(5);             // 連擊里程碑(5/10/15…)賺星塵
  const rem=1-fuseFrac();
  const st=rem>=0.55?3:rem>=0.28?2:1;     // 依剩餘引線給星
  if(rem>=0.75) unlockAch('speed3');      // 閃電手：超快拼對
  const key=L.whole.w;
  let gotHolo=false;                      // 3 星有機會獲得閃卡
  if(mode!=='tower'){                      // 塔不寫星級/閃卡(維持戰役收集的意義)
    if((save.stars[key]||0)<st){save.stars[key]=st;}
    if(st===3 && !save.holo[key] && Math.random()<0.30){save.holo[key]=true;gotHolo=true;}
  }
  const gc=center($('goalbox'));
  sWhoosh();vib(20);
  const dur=540;
  const flies=[];
  slots.forEach((s,i)=>{
    const c=center($('s'+i));
    const f=flyEmoji(s.e,c);flies.push(f);
    f.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},
               {transform:'translate(-50%,-50%) translate('+(gc.x-c.x)+'px,'+(gc.y-c.y)+'px) scale(.5)',opacity:.2}],
              {duration:dur,delay:i*60,easing:'cubic-bezier(.5,0,.5,1)',fill:'forwards'});
    $('s'+i).style.opacity=.3;
  });
  setTimeout(()=>{
    flies.forEach(f=>f.remove());
    slots.forEach((_,i)=>{$('s'+i).style.opacity=1;});
    const gb=$('goalbox'),ge=$('goalE');
    gb.classList.remove('dim');
    ge.textContent=L.whole.e;ge.classList.remove('pop');void ge.offsetWidth;ge.classList.add('pop');
    burst(gc.x,gc.y,['#ffd86b','#ff9a3c','#48d6a0','#7ad0ff','#fff'],32);
    sFuse();vib(40);
    cheerBuddy();                                    // 出戰夥伴歡呼
    revealWord(L.whole.w);
    speak(L.whole.w,1.35);
    $('caption').innerHTML=L.p.map(p=>'<span style="color:var(--ink)">'+p.w+'</span>').join(' + ')+' = <b>'+L.whole.w+'</b>'+
      '<div class="memo">'+L.p.map(p=>pz(p.w)).join(' ＋ ')+' ＝ <b>'+L.whole.zh+'</b></div>';
    const comboBonus=Math.max(0,combo-1)*3;
    const gain=10*L.p.length+(st-1)*5+comboBonus;    // 基礎分 + 星級 + 連擊加成
    if(combo>=10) unlockAch('combo10');
    if(combo>=20) unlockAch('combo20');
    if(mode==='tower'){                              // 塔:不動戰役分數,結算樓層
      addDust(1);                                     // 塔每關也賺一點星塵
      setTimeout(()=>{ sWin(combo); const ct=combo>=2?('  🔥x'+combo):''; toast('🗼 第 '+(towerFloor+1)+' 層'+ct,'#ffd86b'); },520);
    }else{
      score+=gain;save.score=score;
      addDust(2+(st===3?2:0));                        // 拼對 +2、三星再 +2 星塵
      const learned=Object.keys(save.stars).length;
      if(learned>=1) unlockAch('firstword');
      if(learned>=50) unlockAch('collect50');
      if(learned>=allWordKeys().size) unlockAch('collectAll');
      const holoN=Object.keys(save.holo).length;
      if(holoN>=10) unlockAch('holo10');
      if(holoN>=20) unlockAch('holo20');
      persistSave();
      setTimeout(()=>{ sWin(combo); const ct=combo>=2?('  🔥x'+combo):''; toast('⭐'.repeat(st)+ct+'  +'+gain,'#ffd86b'); if(gotHolo)toast('✨ 閃卡 GET！'+L.whole.w,'#7ad0ff'); },520);
    }
    setTimeout(next,1750);
  },dur+slots.length*60-40);
}

function flyEmoji(emoji,c){
  const d=document.createElement('div');d.className='fly';d.textContent=emoji;
  d.style.left=c.x+'px';d.style.top=c.y+'px';d.style.fontSize='50px';d.style.transform='translate(-50%,-50%)';
  document.body.appendChild(d);return d;
}

function revealWord(w){
  const ls=document.querySelectorAll('.wl');
  let k=0;
  [...w].forEach((ch,i)=>{if(ch===' ')return;setTimeout(()=>{if(ls[i]){ls[i].textContent=ls[i].dataset.ch||ch.toUpperCase();ls[i].classList.add('show');sReveal();}},k*65);k++;});
}

function next(){
  if(mode==='tower'){                      // 塔:過一關=爬一層
    towerFloor++; failCount=0;
    if(towerFloor>=10) unlockAch('tower10');
    if(towerFloor>=25) unlockAch('tower25');
    if(towerFloor>(save.towerBest||0)){ save.towerBest=towerFloor; persistSave(); }
    loadTowerLevel(); return;
  }
  lIdx++; failCount=0;                    // 進新關，重置失敗計數
  if(lIdx>=curLevels.length){
    if(stage===0){ showStageClear(); return; }   // 基礎段完成 → 進階段
    finishWorld(); return;                         // 進階段完成 → 世界通關
  }
  load();
}

/* ===================== 世界通關 / 解鎖 ===================== */
function finishWorld(){
  running=false;
  if(timing){worldMs+=Date.now()-segStart;timing=false;}      // 結算本世界用時
  lastWorldMs=worldMs;
  const prev=save.times[wIdx];
  lastPB=(fullRun&&(prev==null||worldMs<prev));                // 只有完整局(含基礎)才算世界最佳
  if(lastPB)save.times[wIdx]=worldMs;                          // 刷新最佳
  const isLast=(wIdx+1>=WORLDS.length);
  if(!isLast && save.unlocked<wIdx+1){save.unlocked=wIdx+1;}   // 解鎖下一世界
  if(save.hell){ unlockAch('hell'); if(isLast) unlockAch('hellAll'); }   // 地獄模式通關成就
  addDust(25);                                                 // 世界通關獎勵星塵
  persistSave();
  submitScore();                                              // 上傳成績到全球排行榜
  if(isLast){ showAllDone(); return; }
  showWorldDone(isLast);
}

function starRow(n){let s='';for(let i=0;i<3;i++)s+='<span class="'+(i<n?'f':'e')+'">⭐</span>';return s;}

let resultMode='world';

}

  const nextW=WORLDS[wIdx+1];

  if(!worldUsedHint&&unlockAch('nohint',true))bonus.push('🎖️ 不靠提示');
  if(!worldUsedItem&&unlockAch('noitem',true))bonus.push('🎖️ 真本事');

  const timeLine=fullRun
    ? ((lastPB?'<b style="color:var(--gold)">🏆 新紀錄！</b> ':'')+'用時 <b>'+fmt(lastWorldMs)+'</b>　最佳 <b>'+fmt(save.times[wIdx])+'</b>')
    : ('🔁 進階重玩　進階用時 <b>'+fmt(lastWorldMs)+'</b>'+(save.times[wIdx]!=null?('　世界最佳 <b>'+fmt(save.times[wIdx])+'</b>'):''));

    '🎁 通關獎勵 '+reward+'　<span style="color:var(--gold)">✨ +25 星塵</span>'+

/* ===================== 提示 ===================== */
/* ---------- 道具 ---------- */
const ITEMS=[['freeze','❄️'],['clear','🔍'],['hint','💡']];
function updateItems(){
  const bar=$('items'); if(bar) bar.style.display=itemsOff()?'none':'';   // 塔/地獄無道具
  if(itemsOff()||!save.items)return;
  [['freeze','ctFreeze','itFreeze'],['clear','ctClear','itClear'],['hint','ctHint','itHint']].forEach(([k,c,b])=>{
    const el=$(c); if(el)el.textContent=save.items[k]||0;
    const bt=$(b); if(bt)bt.classList.toggle('off',(save.items[k]||0)<=0);
  });
}
function grantItems(n){
  if(itemsOff())return '';
  const got={};
  for(let i=0;i<n;i++){const it=ITEMS[Math.random()*ITEMS.length|0];save.items[it[0]]=(save.items[it[0]]||0)+1;got[it[1]]=(got[it[1]]||0)+1;}
  return Object.entries(got).map(([e,c])=>e+'x'+c).join('　');
}
function dropItem(){
  if(itemsOff())return;
  const it=ITEMS[Math.random()*ITEMS.length|0];
  save.items[it[0]]=(save.items[it[0]]||0)+1; persistSave(); updateItems();
  setTimeout(()=>toast('🎁 連擊獎勵 '+it[1]+' +1','#7ad0ff'),950);
}

$('itFreeze').onclick=()=>{
  if(itemsOff()||busy||frozen||!running){return;}
  if((save.items.freeze||0)<=0){toast('❄️ 凍結用完了','#ffb347');return;}
  aInit(); worldUsedItem=true; save.items.freeze--; persistSave(); updateItems();
  frozen=true; $('fuse').classList.add('frozen'); toast('❄️ 凍結引線 5 秒','#7ad0ff'); tone(700,.18,'sine',.12);
  clearTimeout(_freezeTimer);
  _freezeTimer=setTimeout(()=>{frozen=false;$('fuse').classList.remove('frozen');},5000);
};
$('itClear').onclick=()=>{
  if(itemsOff()||busy)return;
  if((save.items.clear||0)<=0){toast('🔍 清干擾用完了','#ffb347');return;}
  const L=curLevels[lIdx];
  const wrongs=[...document.querySelectorAll('.tile')].filter(t=>!t.classList.contains('used')&&!L.p.some(p=>p.w===t.dataset.w));
  if(!wrongs.length){toast('沒有干擾卡可清','#ffb347');return;}
  aInit(); worldUsedItem=true; save.items.clear--; persistSave(); updateItems();

};
$('itHint').onclick=()=>{

/* ===================== 字靈扭蛋機 / 小怪獸(收集養成) ===================== */
/* 設計:每隻怪獸都由 seed「程序化生成」,所以永遠不重複 → 沒有抽到重複的挫折;追的是稀有度。
   星塵只能靠玩賺(拼字/三星/連擊/通關/爬塔),無金流、無限時池、無每日懲罰 → 兒童健康向。 */
const GACHA_COST=10, GACHA_COST10=90;                  // 單抽 10/十抽 90(打9折)
/* 稀有度權重與保底參考主流轉蛋(原神/明日方舟/星穹鐵道):頂級稀有 base 偏低 + 軟保底逐抽遞增 + 硬保底必出 + 十連保底次階。
   但本作零金流、星塵靠玩賺,刻意比商業手遊佛:傳奇 base 4%(商業多 0.6~2%)、硬保底 50 抽(商業 80~99)。 */
const RARW=[56,30,10,4], RNAME=['普通','稀有','史詩','傳奇'];   // 普通/稀有/史詩/傳奇 基礎權重(%)
const LEG_SOFT=40, LEG_HARD=50;        // 傳奇軟保底:第40抽起機率遞增、第50抽必出(save.gachaPity=距上次傳奇的抽數)
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function newSeed(){return (Math.floor(Math.random()*0xFFFFFFFF))>>>0;}
function rollRarity(){
  const p=save.gachaPity||0;                            // 距上次傳奇的抽數
  if(p>=LEG_HARD-1) return 3;                           // 硬保底:第 50 抽必出傳奇
  let leg=RARW[3];
  if(p>=LEG_SOFT) leg=RARW[3]+(p-LEG_SOFT+1)*12;        // 軟保底:第 40 抽起每抽 +12% → 飆到必出
  if(Math.random()*100<leg) return 3;
  const rest=Math.random()*(RARW[0]+RARW[1]+RARW[2]);   // 其餘三檔按比例(普通/稀有/史詩)
  return rest<RARW[0]?0:(rest<RARW[0]+RARW[1]?1:2);
}
/* 名字:由 seed 決定的可愛音節組合 */
const NS1=['Mo','Bo','Pip','Lu','Zi','Ka','Fu','Wo','Gi','Ta','Ne','Bli','Pom','Dux','Yo','Mim','Glu','Squ','Nib','Tok','Vi','Ru'];
const NS2=['bo','zu','la','pi','mo','ko','na','ru','ti','fy','do','gu','mi','po','wa','chi','lu','ni'];
const NS3=['','','kin','let','zoo','pop','boo','too','ky','lo','sy','dle','nu'];
function monName(seed){const r=mulberry32((seed>>>0)^0x9e3779b9);const p=a=>a[Math.floor(r()*a.length)];let s=p(NS1)+p(NS2)+p(NS3);return s.charAt(0).toUpperCase()+s.slice(1);}
/* 由 seed 推導出怪獸的所有外觀特徵(決定論) */
const M_BODY=['round','tall','squat','blob'],M_EYES=[2,2,2,1,3],M_MOUTH=['smile','open','tooth','flat','cat','ohh'],
      M_TOP=['none','horns','antenna','ears','sprout','spike','tuft'],M_PAT=['none','none','spots','belly','spots'];
function monGen(seed,rarity){
  const r=mulberry32(seed>>>0),pick=a=>a[Math.floor(r()*a.length)];
  const h1=Math.floor(r()*360),h2=(h1+30+Math.floor(r()*80))%360;
  return {seed:seed>>>0,rarity:rarity|0,h1,h2,body:pick(M_BODY),eyes:pick(M_EYES),mouth:pick(M_MOUTH),
          top:pick(M_TOP),pat:pick(M_PAT),cheek:r()<0.82,arms:r()<0.55,feet:r()<0.82};
}
function monTop(m,rx,ry,cy,topY,c2,dk){
  const t=m.top; if(t==='none')return'';
  if(t==='horns')return '<path d="M'+(60-12)+' '+topY+' L'+(60-16)+' '+(topY-14)+' L'+(60-6)+' '+(topY-2)+' Z" fill="'+c2+'"/><path d="M'+(60+12)+' '+topY+' L'+(60+16)+' '+(topY-14)+' L'+(60+6)+' '+(topY-2)+' Z" fill="'+c2+'"/>';
  if(t==='antenna')return '<g stroke="'+dk+'" stroke-width="2.4" fill="'+c2+'"><line x1="'+(60-8)+'" y1="'+topY+'" x2="'+(60-13)+'" y2="'+(topY-15)+'"/><line x1="'+(60+8)+'" y1="'+topY+'" x2="'+(60+13)+'" y2="'+(topY-15)+'"/><circle cx="'+(60-13)+'" cy="'+(topY-17)+'" r="4"/><circle cx="'+(60+13)+'" cy="'+(topY-17)+'" r="4"/></g>';
  if(t==='ears')return '<circle cx="'+(60-rx*0.6)+'" cy="'+(topY+5)+'" r="10" fill="'+c2+'"/><circle cx="'+(60+rx*0.6)+'" cy="'+(topY+5)+'" r="10" fill="'+c2+'"/>';
  if(t==='sprout')return '<line x1="60" y1="'+topY+'" x2="60" y2="'+(topY-13)+'" stroke="#3aa657" stroke-width="3"/><ellipse cx="'+(60-6)+'" cy="'+(topY-13)+'" rx="7" ry="4" fill="#49c46a" transform="rotate(-30 '+(60-6)+' '+(topY-13)+')"/><ellipse cx="'+(60+6)+'" cy="'+(topY-15)+'" rx="7" ry="4" fill="#49c46a" transform="rotate(30 '+(60+6)+' '+(topY-15)+')"/>';
  if(t==='spike'){let p='';for(let i=-1;i<=1;i++){const x=60+i*12;p+='<path d="M'+(x-7)+' '+(topY+2)+' L'+x+' '+(topY-12)+' L'+(x+7)+' '+(topY+2)+' Z" fill="'+c2+'"/>';}return p;}
  if(t==='tuft')return '<path d="M'+(60-11)+' '+(topY+2)+' Q60 '+(topY-20)+' '+(60+11)+' '+(topY+2)+' Z" fill="'+c2+'"/>';
  return'';
}
function monCrown(topY){return '<g transform="translate(60,'+(topY-9)+')"><path d="M-13 6 L-13 -6 L-5 2 L0 -9 L5 2 L13 -6 L13 6 Z" fill="#ffd54a" stroke="#caa01e" stroke-width="1"/><circle cx="0" cy="-9" r="2.2" fill="#ff5470"/></g>';}
function monFace(m,rx,ry,cy,dk,lt){
  const ey=cy-5; let xs=[];
  if(m.eyes===1)xs=[60]; else if(m.eyes===3)xs=[60-16,60,60+16]; else xs=[60-13,60+13];
  const er=m.eyes===1?11:8; let s='';
  xs.forEach(x=>{ s+='<ellipse cx="'+x+'" cy="'+ey+'" rx="'+er+'" ry="'+(er+1)+'" fill="#fff"/>';
    s+='<circle cx="'+x+'" cy="'+(ey+2)+'" r="'+(er*0.5)+'" fill="'+dk+'"/>';
    s+='<circle cx="'+(x-er*0.28)+'" cy="'+(ey-er*0.25)+'" r="'+(er*0.2)+'" fill="#fff"/>'; });
  if(m.cheek){ const off=m.eyes===1?18:22, cyy=ey+11;
    s+='<ellipse cx="'+(60-off)+'" cy="'+cyy+'" rx="6" ry="4" fill="#ff7a99" opacity="0.55"/><ellipse cx="'+(60+off)+'" cy="'+cyy+'" rx="6" ry="4" fill="#ff7a99" opacity="0.55"/>'; }
  const my=ey+13;
  if(m.mouth==='smile')s+='<path d="M'+(60-8)+' '+my+' Q60 '+(my+8)+' '+(60+8)+' '+my+'" stroke="'+dk+'" stroke-width="2.4" fill="none" stroke-linecap="round"/>';
  else if(m.mouth==='open')s+='<ellipse cx="60" cy="'+(my+2)+'" rx="6" ry="5" fill="'+dk+'"/><ellipse cx="60" cy="'+(my+4)+'" rx="3" ry="2.5" fill="#ff6a8a"/>';
  else if(m.mouth==='tooth')s+='<path d="M'+(60-8)+' '+my+' Q60 '+(my+8)+' '+(60+8)+' '+my+'" stroke="'+dk+'" stroke-width="2.4" fill="none" stroke-linecap="round"/><rect x="'+(60-2)+'" y="'+my+'" width="4" height="4" rx="1" fill="#fff"/>';
  else if(m.mouth==='cat')s+='<path d="M'+(60-8)+' '+my+' Q'+(60-4)+' '+(my+5)+' 60 '+my+' Q'+(60+4)+' '+(my+5)+' '+(60+8)+' '+my+'" stroke="'+dk+'" stroke-width="2.2" fill="none" stroke-linecap="round"/>';
  else if(m.mouth==='ohh')s+='<circle cx="60" cy="'+(my+2)+'" r="4" fill="'+dk+'"/>';
  else s+='<line x1="'+(60-6)+'" y1="'+my+'" x2="'+(60+6)+'" y2="'+my+'" stroke="'+dk+'" stroke-width="2.4" stroke-linecap="round"/>';
  return s;
}
/* 產生一隻怪獸的 SVG 字串(無 width/height,由外層容器決定大小) */
function monSVG(seed,rarity){
  const m=monGen(seed,rarity); rarity=m.rarity;
  const id='mg'+(seed>>>0).toString(36);
  const c1='hsl('+m.h1+',72%,64%)',c2='hsl('+m.h2+',62%,44%)',dk='hsl('+m.h1+',50%,20%)',lt='hsl('+m.h1+',82%,84%)';
  let rx=36,ry=33,cy=68;
  if(m.body==='tall'){rx=29;ry=41;cy=64;} else if(m.body==='squat'){rx=42;ry=27;cy=74;}
  const topY=cy-ry,botY=cy+ry,S=[];
  S.push('<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">');
  S.push('<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+c1+'"/><stop offset="1" stop-color="'+c2+'"/></linearGradient></defs>');
  if(rarity>=3)S.push('<circle cx="60" cy="'+cy+'" r="50" fill="hsl('+m.h1+',95%,68%)" opacity="0.16"/>');
  if(rarity>=2){S.push('<g opacity="0.9" fill="'+lt+'"><ellipse cx="'+(60-rx+2)+'" cy="'+(cy-2)+'" rx="13" ry="20" transform="rotate(-28 '+(60-rx+2)+' '+(cy-2)+')"/><ellipse cx="'+(60+rx-2)+'" cy="'+(cy-2)+'" rx="13" ry="20" transform="rotate(28 '+(60+rx-2)+' '+(cy-2)+')"/></g>');}
  if(m.feet)S.push('<ellipse cx="'+(60-rx*0.45)+'" cy="'+(botY-3)+'" rx="9" ry="6" fill="'+c2+'"/><ellipse cx="'+(60+rx*0.45)+'" cy="'+(botY-3)+'" rx="9" ry="6" fill="'+c2+'"/>');
  if(m.arms)S.push('<ellipse cx="'+(60-rx-2)+'" cy="'+(cy+5)+'" rx="7" ry="10" fill="'+c2+'"/><ellipse cx="'+(60+rx+2)+'" cy="'+(cy+5)+'" rx="7" ry="10" fill="'+c2+'"/>');
  S.push('<ellipse cx="60" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="url(#'+id+')"/>');
  if(m.pat==='spots')S.push('<g fill="'+dk+'" opacity="0.16"><circle cx="'+(60-rx*0.4)+'" cy="'+(cy+ry*0.3)+'" r="5"/><circle cx="'+(60+rx*0.35)+'" cy="'+(cy-ry*0.05)+'" r="4"/><circle cx="60" cy="'+(cy+ry*0.5)+'" r="3.5"/></g>');
  else if(m.pat==='belly')S.push('<ellipse cx="60" cy="'+(cy+ry*0.28)+'" rx="'+(rx*0.55)+'" ry="'+(ry*0.5)+'" fill="'+lt+'" opacity="0.5"/>');
  S.push(monTop(m,rx,ry,cy,topY,c2,dk));
  if(rarity>=3)S.push(monCrown(topY));
  S.push(monFace(m,rx,ry,cy,dk,lt));
  if(rarity===1)S.push('<text x="90" y="34" font-size="15">✨</text>');
  S.push('</svg>');
  return S.join('');
}

}

/* ---- 小怪獸放大預覽 + 設為出戰 ---- */
let _monPvObj=null;
function openMonPreview(mo){
  _monPvObj=mo;
  $('monPvSvg').innerHTML=monSVG(mo.s,mo.r);
  $('monPvName').textContent=monName(mo.s);
  $('monPvR').innerHTML='<span class="rcol'+mo.r+'">'+RNAME[mo.r]+'</span>';
  $('monPvCard').className='card r'+mo.r;
  const idx=(save.monsters||[]).indexOf(mo);
  $('monSetBtn').textContent=(save.activeMon===idx)?'✓ 出戰中':'設為出戰夥伴';
  $('monPv').classList.add('show');
  ensureSfx(); sStar(); dexSparkle(innerWidth/2,innerHeight/2,mo.r>=2,$('monPv'));
}

/* ===================== 啟動 ===================== */
const APP_VER='1.3';
document.querySelectorAll('.brand .v').forEach(e=>e.textContent='v'+APP_VER);
loadPlayCount();
$('addPlayer').onclick=addPlayerFromInput;
$('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')addPlayerFromInput();});
$('switchP').onclick=()=>{ persistSave(); showPlayers(); };   // 換人前先存好目前進度
$('dexBtn').onclick=openDex;
$('dexBack').onclick=openMap;
$('dexPv').onclick=closeDexPreview;                          // 點暗區關閉
$('dexPvCard').onclick=(e)=>{                               // 點卡片 → 複習/再放一次火花(不關閉)
  e.stopPropagation();
  ensureSfx(); if(_dexPvWord) speak(_dexPvWord,1.2); sStar();
  $('dexPvCard').animate([{transform:'scale(1)'},{transform:'scale(1.07)'},{transform:'scale(1)'}],{duration:300,easing:'ease-out'});
  dexSparkle(innerWidth/2,innerHeight/2,_dexPvHolo);
};
$('lbBtn').onclick=openLeaderboard;
$('lbBack').onclick=openMap;
/* 🎰 扭蛋機 / 👾 小怪獸 */
$('gachaBtn').onclick=openGacha;
$('gOne').onclick=()=>pull(1);
$('gTen').onclick=()=>pull(10);
$('gBack').onclick=openMap;
$('gAgain').onclick=()=>{ $('gachaResult').style.display='none'; $('gachaMain').style.display='flex'; updateGachaUI(); };
$('gDex').onclick=()=>{ $('gachaOvl').classList.remove('show'); openDex(); };
$('gDex2').onclick=()=>{ $('gachaOvl').classList.remove('show'); openDex(); };
$('monPv').onclick=()=>$('monPv').classList.remove('show');                 // 點暗區關閉
$('monPvCard').onclick=(e)=>e.stopPropagation();
$('monSetBtn').onclick=(e)=>{
  e.stopPropagation();
  const idx=(save.monsters||[]).indexOf(_monPvObj);
  if(idx>=0){ save.activeMon=idx; persistSave(); renderBuddy(); $('monSetBtn').textContent='✓ 出戰中'; sStar(); toast('🤝 '+monName(_monPvObj.s)+' 成為出戰夥伴！','#48d6a0'); }
};
$('failRetry').onclick=()=>{ $('failOvl').classList.remove('show'); enterWorld(wIdx); };  // 重來本世界
$('failMap').onclick=()=>{ $('failOvl').classList.remove('show'); openMap(); };
$('twAgain').onclick=()=>{ $('towerOvl').classList.remove('show'); enterTower(); };       // 字靈塔再爬一次
$('twBoard').onclick=()=>openLeaderboard('tower');                                        // 看爬塔榜
$('twMap').onclick=()=>{ $('towerOvl').classList.remove('show'); openMap(); };
$('lbTabScore').onclick=()=>openLeaderboard('score');
$('lbTabTower').onclick=()=>openLeaderboard('tower');
$('dTower').onclick=()=>{ $('doneOvl').classList.remove('show'); enterTower(); };          // 全破 → 直接進塔
$('hellBtn').onclick=()=>{ save.hell=!save.hell; persistSave(); renderMap(); toast(save.hell?'🔥 地獄模式開啟!引線砍半、沒有道具':'地獄模式關閉',save.hell?'#ff6a6a':'#7ad0ff'); };

loadPlayers();
if(players.current && players.list.includes(players.current)){
  loadSave(); score=save.score; $('score').textContent=score;
  openMap();                                                  // 已有上次玩家 → 直接回地圖
}else{
  showPlayers();                                              // 第一次 → 先選/建玩家
}
</script>
</body>
</html>
