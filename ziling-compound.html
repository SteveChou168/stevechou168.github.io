<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>字靈 · 組字挑戰</title>
<style>
  :root{
    --bg1:#15123a; --bg2:#0d0b26; --machine:#241d4a; --machine2:#352a6b;
    --line:#4a3f86; --ink:#f4f1ff; --dim:#9d96c9;
    --warm:#ff7a59; --warm2:#ffb347; --gold:#ffd86b;
    --cool:#4ea8ff; --cool2:#7ad0ff; --good:#48d6a0; --bad:#ff5470;
    --green:#34c759; --green2:#27a347;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,"PingFang TC","Noto Sans TC",sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    color:var(--ink); overflow:hidden; user-select:none; display:flex; justify-content:center;
  }
  #app{width:100%;max-width:480px;height:100dvh;display:flex;flex-direction:column;padding:12px 16px 18px;position:relative;z-index:2}

  header{display:flex;align-items:center;gap:10px}
  .iconbtn{width:34px;height:34px;border-radius:10px;background:var(--machine2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink)}
  .title{font-weight:800;font-size:17px;letter-spacing:.5px}
  .title b{color:var(--warm2)}
  .spacer{flex:1}
  .score{color:var(--gold);font-weight:800;font-size:15px}

  .pips{display:flex;gap:4px;justify-content:center;margin:12px 0 4px;flex-wrap:wrap}
  .pip{width:12px;height:12px;border-radius:4px;background:var(--machine);border:1px solid var(--line)}
  .pip.on{background:var(--good);border-color:var(--good)}
  .pip.cur{background:var(--gold);border-color:var(--gold)}

  .goal{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:6px}
  .meaning{color:var(--cool2);font-weight:700;font-size:15px;height:20px}
  .word{display:flex;gap:4px;height:34px;align-items:center;flex-wrap:wrap;justify-content:center}
  .wl{font-weight:900;font-size:22px;color:var(--gold);min-width:15px;text-align:center;
    border-bottom:3px solid var(--line);line-height:1;padding-bottom:2px;opacity:.5;transition:.2s}
  .wl.show{opacity:1;border-color:transparent}
  .wl.sp{border:none;min-width:9px}

  .build{display:flex;align-items:center;justify-content:center;gap:6px;margin:auto 0}
  .slot{flex:1 1 0;max-width:96px;aspect-ratio:4/5;border-radius:18px;background:var(--machine);
    border:2px dashed var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    transition:transform .12s,border-color .12s,background .12s}
  .slot.filled{border-style:solid;border-color:var(--warm);background:var(--machine2)}
  .slot .e{font-size:46px;line-height:1}
  .slot .w{font-size:13px;font-weight:800;color:var(--ink)}
  .slot .q{font-size:38px;color:var(--line)}
  .op{font-size:26px;font-weight:900;color:var(--dim);flex:0 0 auto}
  .goalbox{flex:1.15 1 0;max-width:108px;aspect-ratio:9/10;border-radius:18px;
    background:radial-gradient(circle at 50% 40%,#2a2358,#1b1640);border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;position:relative;overflow:visible}
  .goalbox .e{font-size:54px;line-height:1;transition:.25s}
  .goalbox.dim .e{opacity:.3;filter:grayscale(.55)}
  .goalbox .pop{animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.35)}100%{transform:scale(1)}}

  .build.n3{gap:4px}
  .build.n3 .slot .e{font-size:34px}
  .build.n3 .slot .w{font-size:11px}
  .build.n3 .slot .q{font-size:28px}
  .build.n3 .op{font-size:20px}
  .build.n3 .goalbox .e{font-size:44px}

  .caption{height:22px;text-align:center;color:var(--dim);font-weight:700;font-size:14px;margin-top:2px}
  .caption b{color:var(--good)}

  .bank{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
  .tile{background:linear-gradient(180deg,#3a2f78,#2a2258);border:1px solid var(--line);border-bottom:3px solid #1c1742;
    border-radius:14px;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:transform .08s,opacity .2s}
  .tile:active{transform:translateY(2px)}
  .tile .e{font-size:32px;line-height:1}
  .tile .w{font-size:13px;font-weight:800;color:var(--ink)}
  .tile.used{opacity:.26;pointer-events:none}

  .row{display:flex;gap:10px}
  .clear{flex:0 0 auto;height:60px;padding:0 20px;border:1px solid var(--line);border-radius:18px;background:var(--machine2);
    color:var(--dim);font-size:16px;font-weight:800}
  .clear:active{transform:translateY(2px)}
  .submit{flex:1;height:60px;border:none;border-radius:18px;font-size:22px;font-weight:900;color:#063018;
    background:linear-gradient(180deg,#3fe06a,var(--green2));box-shadow:0 6px 0 #1e7e38,0 10px 18px rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,opacity .2s}
  .submit:active{transform:translateY(4px);box-shadow:0 2px 0 #1e7e38}
  .submit:disabled{opacity:.4;box-shadow:0 6px 0 #1e7e38}
  .tools{display:flex;justify-content:center;margin-top:10px}
  .toolbtn{background:var(--machine2);border:1px solid var(--gold);color:var(--gold);font-weight:700;font-size:13px;padding:9px 16px;border-radius:11px}

  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(4px)}}

  .toast{position:absolute;top:120px;left:0;right:0;text-align:center;font-weight:800;font-size:19px;pointer-events:none;opacity:0}
  .toast.show{animation:toast 1.3s ease forwards}
  @keyframes toast{0%{opacity:0;transform:translateY(8px)}15%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-20px)}}

  #fx{position:fixed;inset:0;pointer-events:none;z-index:5}
  .fly{position:fixed;z-index:6;pointer-events:none;line-height:1;will-change:transform,opacity}

  .done{position:fixed;inset:0;background:rgba(8,6,24,.85);display:none;align-items:center;justify-content:center;z-index:10}
  .done.show{display:flex}
  .panel{background:var(--machine);border:1px solid var(--line);border-radius:22px;padding:28px 26px;text-align:center;max-width:320px}
  .panel .big{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:8px}
  .panel .sub{color:var(--dim);font-size:14px;line-height:1.6;margin-bottom:18px}
  .panel button{background:linear-gradient(180deg,var(--warm2),var(--warm));border:none;color:#062038;font-weight:800;font-size:16px;padding:12px 26px;border-radius:12px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="iconbtn" onclick="location.reload()">↻</div>
    <div class="title">組字挑戰 第<b id="lv">1</b>關</div>
    <div class="spacer"></div>
    <div class="iconbtn" id="mute">🔊</div>
    <div class="score" id="score">0</div>
  </header>

  <div class="pips" id="pips"></div>

  <div class="goal">
    <div class="meaning" id="meaning">—</div>
    <div class="word" id="word"></div>
  </div>

  <div class="build" id="build"></div>
  <div class="caption" id="caption"></div>

  <div class="bank" id="bank"></div>

  <div class="row">
    <button class="clear" id="clear">清除</button>
    <button class="submit" id="submit" disabled>✓ 提交</button>
  </div>
  <div class="tools"><button class="toolbtn" id="hint">提示 (露一個部件)</button></div>

  <div class="toast" id="toast"></div>
</div>

<canvas id="fx"></canvas>

<div class="done" id="doneOvl">
  <div class="panel">
    <div class="big">全部組好了 🎉</div>
    <div class="sub" id="doneSub"></div>
    <button onclick="location.reload()">再玩一次</button>
  </div>
</div>

<script>
/* ---------- data ---------- */
const LEVELS=[
  {p:[{w:"sun",e:"☀️"},{w:"flower",e:"🌸"}], whole:{w:"sunflower",e:"🌻",zh:"向日葵"}},
  {p:[{w:"pan",e:"🍳"},{w:"cake",e:"🍰"}],   whole:{w:"pancake",e:"🥞",zh:"鬆餅"}},
  {p:[{w:"cup",e:"☕"},{w:"cake",e:"🍰"}],     whole:{w:"cupcake",e:"🧁",zh:"杯子蛋糕"}},
  {p:[{w:"water",e:"💧"},{w:"melon",e:"🍈"}],whole:{w:"watermelon",e:"🍉",zh:"西瓜"}},
  {p:[{w:"cow",e:"🐮"},{w:"boy",e:"👦"}],     whole:{w:"cowboy",e:"🤠",zh:"牛仔"}},
  {p:[{w:"rain",e:"🌧️"},{w:"bow",e:"🎀"}],   whole:{w:"rainbow",e:"🌈",zh:"彩虹"}},
  {p:[{w:"butter",e:"🧈"},{w:"fly",e:"🪰"}],  whole:{w:"butterfly",e:"🦋",zh:"蝴蝶"}},
  {p:[{w:"foot",e:"🦶"},{w:"ball",e:"⚽"}],   whole:{w:"football",e:"🏈",zh:"足球"}},
  {p:[{w:"jelly",e:"🟪"},{w:"fish",e:"🐟"}], whole:{w:"jellyfish",e:"🪼",zh:"水母"}},
  {p:[{w:"fire",e:"🔥"},{w:"truck",e:"🚚"}], whole:{w:"firetruck",e:"🚒",zh:"消防車"}},
  {p:[{w:"book",e:"📖"},{w:"worm",e:"🐛"}],   whole:{w:"bookworm",e:"🐛",zh:"書蟲"}},
  {p:[{w:"snow",e:"❄️"},{w:"man",e:"🧍"}],   whole:{w:"snowman",e:"⛄",zh:"雪人"}},
  {p:[{w:"bubble",e:"🫧"},{w:"milk",e:"🥛"},{w:"tea",e:"🍵"}], whole:{w:"bubble milk tea",e:"🧋",zh:"珍珠奶茶"}},
  {p:[{w:"peanut",e:"🥜"},{w:"butter",e:"🧈"},{w:"jelly",e:"🟪"}], whole:{w:"peanut butter jelly",e:"🥪",zh:"花生醬果醬三明治"}},
];
const DISTRACT=[{w:"moon",e:"🌙"},{w:"star",e:"⭐"},{w:"tree",e:"🌲"},{w:"fish",e:"🐟"},
  {w:"milk",e:"🥛"},{w:"fire",e:"🔥"},{w:"snow",e:"❄️"},{w:"foot",e:"🦶"},{w:"ball",e:"⚽"},
  {w:"key",e:"🔑"},{w:"dog",e:"🐶"},{w:"hat",e:"🎩"},{w:"egg",e:"🥚"},{w:"leaf",e:"🍃"},
  {w:"rice",e:"🍚"},{w:"corn",e:"🌽"},{w:"bird",e:"🐦"},{w:"car",e:"🚗"}];

/* ---------- state ---------- */
let idx=0, slots=[], score=0, busy=false;
const $=id=>document.getElementById(id);

/* ---------- audio ---------- */
let actx,master,soundOn=true;
function aInit(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=.9;master.connect(actx.destination);}
function tone(f,d,t="triangle",v=.2,w=0){if(!actx||!soundOn)return;const T=actx.currentTime+w,o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0,T);g.gain.linearRampToValueAtTime(v,T+.01);g.gain.exponentialRampToValueAtTime(.0001,T+d);o.connect(g);g.connect(master);o.start(T);o.stop(T+d+.02);}
const sPick=()=>tone(540,.05,"square",.09);
const sClear=()=>tone(300,.07,"square",.07);
const sBad=()=>{tone(170,.16,"sawtooth",.14);tone(140,.2,"sawtooth",.1,.05);};
const sWhoosh=()=>{if(!actx||!soundOn)return;const b=actx.createBuffer(1,actx.sampleRate*.3,actx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);const s=actx.createBufferSource();s.buffer=b;const g=actx.createGain();g.gain.value=.16;const f=actx.createBiquadFilter();f.type="bandpass";f.frequency.value=1200;s.connect(f);f.connect(g);g.connect(master);s.start();};
const sFuse=()=>[0,4,7,12].forEach((s,i)=>tone(523.25*Math.pow(2,s/12),.22,"triangle",.16,i*.05));
const sReveal=()=>{tone(880,.1,"sine",.14);tone(1320,.14,"sine",.1,.06);};
const sDone=()=>[0,4,7,12,16,19].forEach((s,i)=>tone(440*Math.pow(2,s/12),.4,"triangle",.2,i*.12));
/* TTS：避免 mobile Chrome 連續 cancel() 卡死的問題 */
let _voices=[];
function loadVoices(){if(!("speechSynthesis"in window))return;const v=speechSynthesis.getVoices();if(v&&v.length)_voices=v;}
if("speechSynthesis"in window){loadVoices();try{speechSynthesis.onvoiceschanged=loadVoices;}catch(e){}}
function pickVoice(){return _voices.find(v=>/^en[-_]/i.test(v.lang))||_voices.find(v=>/en/i.test(v.lang))||null;}
function speak(w,pitch){
  if(!("speechSynthesis"in window)||!soundOn)return;
  try{
    const sp=window.speechSynthesis;
    const go=()=>{const u=new SpeechSynthesisUtterance(w);u.lang="en-US";u.pitch=pitch||1.1;u.rate=1.0;const v=pickVoice();if(v)u.voice=v;sp.speak(u);};
    if(sp.paused){try{sp.resume();}catch(e){}}
    if(sp.speaking||sp.pending){sp.cancel();setTimeout(go,140);}  // 只有正在講時才打斷，且延遲避開 race
    else{go();}
  }catch(e){}
}
function vib(ms){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}

/* ---------- particles ---------- */
const cv=$('fx'),cx=cv.getContext('2d');let parts=[];
function rs(){cv.width=innerWidth;cv.height=innerHeight}rs();addEventListener('resize',rs);
function burst(x,y,cols,n){for(let i=0;i<(n||26);i++){const a=Math.random()*6.28,s=2+Math.random()*7;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,c:cols[i%cols.length],r:2+Math.random()*3})}}
(function loop(){cx.clearRect(0,0,cv.width,cv.height);parts=parts.filter(p=>p.life>0);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=.022;cx.globalAlpha=Math.max(p.life,0);cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,p.r,0,7);cx.fill()});cx.globalAlpha=1;requestAnimationFrame(loop)})();

/* ---------- helpers ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function center(el){const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
function toast(t,c){const el=$('toast');el.textContent=t;el.style.color=c||'var(--good)';el.classList.remove('show');void el.offsetWidth;el.classList.add('show')}

/* ---------- render ---------- */
function buildPips(){const w=$('pips');w.innerHTML='';for(let i=0;i<LEVELS.length;i++){const d=document.createElement('div');d.className='pip'+(i<idx?' on':i===idx?' cur':'');w.appendChild(d)}}

function load(){
  const L=LEVELS[idx];
  const n=L.p.length;
  slots=new Array(n).fill(null);busy=false;
  $('lv').textContent=idx+1;
  $('meaning').textContent=L.whole.zh;
  $('caption').innerHTML='';

  const b=$('build');b.className='build'+(n===3?' n3':'');b.innerHTML='';
  for(let i=0;i<n;i++){
    if(i>0){const op=document.createElement('div');op.className='op';op.textContent='+';b.appendChild(op);}
    const s=document.createElement('div');s.className='slot';s.id='s'+i;s.innerHTML='<span class="q">?</span>';
    s.onclick=()=>clearSlot(i);b.appendChild(s);
  }
  const eq=document.createElement('div');eq.className='op';eq.textContent='=';b.appendChild(eq);
  const gb=document.createElement('div');gb.className='goalbox dim';gb.id='goalbox';
  gb.innerHTML='<span class="e" id="goalE">'+L.whole.e+'</span>';b.appendChild(gb);

  const wd=$('word');wd.innerHTML='';
  [...L.whole.w].forEach(ch=>{const s=document.createElement('div');
    if(ch===' '){s.className='wl sp';s.textContent='';}
    else{s.className='wl';s.dataset.ch=ch.toUpperCase();s.textContent='\u00A0';}
    wd.appendChild(s);});

  const need=Math.max(6,n+3);
  const wrong=shuffle(DISTRACT.filter(d=>!L.p.some(p=>p.w===d.w))).slice(0,need-n);
  const bank=shuffle([...L.p,...wrong]);
  const bk=$('bank');bk.innerHTML='';
  bank.forEach(item=>{
    const t=document.createElement('div');t.className='tile';t.dataset.w=item.w;
    t.innerHTML='<div class="e">'+item.e+'</div><div class="w">'+item.w+'</div>';
    t.onclick=()=>pick(item,t);bk.appendChild(t);
  });
  buildPips();updateSubmit();
}

function renderSlot(i){
  const el=$('s'+i),v=slots[i];
  if(v){el.className='slot filled';el.innerHTML='<div class="e">'+v.e+'</div><div class="w">'+v.w+'</div>';}
  else{el.className='slot';el.innerHTML='<span class="q">?</span>';}
  el.onclick=()=>clearSlot(i);
}

function clearSlot(i){
  if(busy||!slots[i])return;
  const w=slots[i].w;slots[i]=null;renderSlot(i);
  const tile=[...document.querySelectorAll('.tile')].find(t=>t.dataset.w===w&&t.classList.contains('used'));
  if(tile)tile.classList.remove('used');
  sClear();updateSubmit();
}

function pick(item,tile){
  if(busy)return;aInit();
  const i=slots.findIndex(s=>!s);
  if(i<0)return;
  slots[i]=item;tile.classList.add('used');renderSlot(i);
  sPick();vib(8);
  speak(item.w);
  updateSubmit();
}

function updateSubmit(){$('submit').disabled=slots.some(s=>!s)||busy;}

$('clear').onclick=()=>{
  if(busy)return;
  let any=false;
  slots.forEach((s,i)=>{if(s){any=true;slots[i]=null;renderSlot(i);}});
  document.querySelectorAll('.tile.used').forEach(t=>t.classList.remove('used'));
  if(any){sClear();vib(12);}
  updateSubmit();
};

/* ---------- submit / fuse ---------- */
$('submit').onclick=()=>{
  if(busy||slots.some(s=>!s))return;aInit();
  const L=LEVELS[idx];
  const ok=slots.every((s,i)=>s.w===L.p[i].w);
  if(!ok){
    sBad();vib([30,40,30]);
    slots.forEach((_,i)=>{const el=$('s'+i);el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),400);});
    const sameSet=slots.map(s=>s.w).sort().join()===L.p.map(p=>p.w).sort().join();
    if(sameSet)toast('順序不對！','#ffb347');
    return;
  }
  fuse(L);
};

function fuse(L){
  busy=true;updateSubmit();
  const gc=center($('goalbox'));
  sWhoosh();vib(20);
  const dur=540;
  const flies=[];
  slots.forEach((s,i)=>{
    const c=center($('s'+i));
    const f=flyEmoji(s.e,c);flies.push(f);
    f.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},
               {transform:'translate(-50%,-50%) translate('+(gc.x-c.x)+'px,'+(gc.y-c.y)+'px) scale(.5)',opacity:.2}],
              {duration:dur,delay:i*60,easing:'cubic-bezier(.5,0,.5,1)',fill:'forwards'});
    $('s'+i).style.opacity=.3;
  });
  setTimeout(()=>{
    flies.forEach(f=>f.remove());
    slots.forEach((_,i)=>{$('s'+i).style.opacity=1;});
    const gb=$('goalbox'),ge=$('goalE');
    gb.classList.remove('dim');
    ge.textContent=L.whole.e;ge.classList.remove('pop');void ge.offsetWidth;ge.classList.add('pop');
    burst(gc.x,gc.y,['#ffd86b','#ff9a3c','#48d6a0','#7ad0ff','#fff'],32);
    sFuse();vib(40);
    revealWord(L.whole.w);
    speak(L.whole.w,1.35);
    $('caption').innerHTML=L.p.map(p=>'<span style="color:var(--ink)">'+p.w+'</span>').join(' + ')+' = <b>'+L.whole.w+'</b>';
    score+=10*L.p.length;$('score').textContent=score;
    setTimeout(next,1700);
  },dur+slots.length*60-40);
}

function flyEmoji(emoji,c){
  const d=document.createElement('div');d.className='fly';d.textContent=emoji;
  d.style.left=c.x+'px';d.style.top=c.y+'px';d.style.fontSize='50px';d.style.transform='translate(-50%,-50%)';
  document.body.appendChild(d);return d;
}

function revealWord(w){
  const ls=document.querySelectorAll('.wl');
  let k=0;
  [...w].forEach((ch,i)=>{if(ch===' ')return;setTimeout(()=>{if(ls[i]){ls[i].textContent=ls[i].dataset.ch||ch.toUpperCase();ls[i].classList.add('show');sReveal();}},k*65);k++;});
}

function next(){
  idx++;
  if(idx>=LEVELS.length){
    sDone();
    $('doneSub').innerHTML='你把 '+LEVELS.length+' 組英文合成詞拼合起來，得分 <b style="color:var(--gold)">'+score+'</b>。<br>每個大字，都是幾個小字長出來的。';
    $('doneOvl').classList.add('show');return;
  }
  load();
}

$('hint').onclick=()=>{
  if(busy)return;aInit();
  const L=LEVELS[idx];
  for(let i=0;i<L.p.length;i++){
    if(!slots[i]||slots[i].w!==L.p[i].w){
      if(slots[i]){const w=slots[i].w;const t=[...document.querySelectorAll('.tile')].find(x=>x.dataset.w===w&&x.classList.contains('used'));if(t)t.classList.remove('used');}
      slots[i]=L.p[i];renderSlot(i);
      const tile=[...document.querySelectorAll('.tile')].find(x=>x.dataset.w===L.p[i].w&&!x.classList.contains('used'));
      if(tile)tile.classList.add('used');
      sReveal();vib(10);speak(L.p[i].w);updateSubmit();break;
    }
  }
};

$('mute').onclick=function(){soundOn=!soundOn;this.textContent=soundOn?'🔊':'🔇';};

load();
</script>
